<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="nav">
            <label for="">Buscar:</label>
            <br>
            <input type="text" id="buscart">
            <select name="" id="filtro">
                <option value="Todas">Todas</option>
                <option value="Pendientes">Pendientes</option>
                <option value="Completas">Completas</option>
            </select>
            <br>
            <button id="agregar" class="add-button">Agregar</button>
            <br>
            <p>Cantidad de pendientes: </p><p id="conteo" class=""></p>
        </div>
        <div class="add menu-add oculto" id="menu-add">
            <label for="t">Titulo:</label>
            <br>
            <input maxlength="50" type="text" name="t" placeholder="Titulo" id="titulo">
            <br>
            <label for="d">Descripcion:</label>
            <br>
            <textarea maxlength="150" name="d" id="descripcion" placeholder="Descripcion" ></textarea>
            <br>
            <button id="salir" class="delete-button">Salir</button>
            <button id="enviar" class="add-button" value="">Agregar</button>
        </div>
        <hr>
        <div id="items">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
